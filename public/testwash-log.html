<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testwash Log</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="/styles.css"> <!-- your existing shared stylesheet -->
<style>
  :root {
    --bg: var(--bg, #f7f7f8);
    --card: var(--card, #ffffff);
    --border: var(--border, #e4e4e7);
    --text: var(--text, #18181b);
    --muted: var(--muted, #71717a);
    --accent: var(--accent, #2563eb);
    --radius: var(--radius, 14px);
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: inherit;
  }
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 1.4rem;
    border-bottom: 1px solid var(--border);
    background: var(--card);
  }
  .page-header h4 {
    margin: 0;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: .5rem;
  }
  .btn-back {
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text);
    border-radius: 10px;
    padding: 6px 12px;
    font-size: .85rem;
    font-weight: 600;
  }
  .container-main {
    max-width: 960px;
    margin: 0 auto;
    padding: 1.5rem 1rem 3rem;
  }
  .card-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.2rem 1.3rem;
    margin-bottom: 1.2rem;
  }
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .month-nav button {
    border: 1.5px solid var(--border);
    background: transparent;
    border-radius: 10px;
    padding: 6px 10px;
    color: var(--text);
  }
  .month-nav .current-month {
    font-weight: 700;
    font-size: 1.05rem;
  }
  .btn-add {
    background: var(--accent);
    border: none;
    color: #fff;
    font-weight: 600;
    border-radius: 10px;
    padding: 8px 16px;
    font-size: .9rem;
  }
  table.testwash-table {
    width: 100%;
    border-collapse: collapse;
    font-size: .88rem;
  }
  table.testwash-table th {
    text-align: left;
    font-size: .72rem;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    padding: 8px 10px;
  }
  table.testwash-table td {
    padding: 10px 10px;
    border-bottom: 1px solid var(--border);
  }
  table.testwash-table tr:last-child td {
    border-bottom: none;
  }
  .badge-code {
    background: rgba(37,99,235,.1);
    color: var(--accent);
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: .78rem;
  }
  .empty-state {
    text-align: center;
    padding: 2.5rem 1rem;
    color: var(--muted);
  }
  .empty-state i {
    font-size: 2rem;
    margin-bottom: .5rem;
    display: block;
  }
  .delete-btn {
    background: none;
    border: none;
    color: #dc2626;
    font-size: .95rem;
  }
  .modal-content {
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  .form-label {
    font-size: .82rem;
    font-weight: 600;
    color: var(--text);
  }
  .form-control, .form-select {
    border-radius: 10px;
    border: 1.5px solid var(--border);
  }
</style>
</head>
<body>
  <div class="page-header">
    <h4><i class="bi bi-car-front"></i> Testwash Log</h4>
    <div style="display:flex; gap:.6rem;">
      <button class="btn-back" onclick="window.location='/'"><i class="bi bi-house"></i> Home</button>
    </div>
  </div>
  <div class="container-main">
    <div class="card-panel">
      <div class="month-nav">
        <button onclick="changeMonth(-1)"><i class="bi bi-chevron-left"></i></button>
        <div class="current-month" id="current-month-label">Loading...</div>
        <button onclick="changeMonth(1)"><i class="bi bi-chevron-right"></i></button>
      </div>
      <div style="display:flex; justify-content:flex-end;">
        <button class="btn-add" data-bs-toggle="modal" data-bs-target="#modal-add-testwash">
          <i class="bi bi-plus-circle"></i> Log New Testwash
        </button>
      </div>
    </div>
    <div class="card-panel">
      <div id="table-wrapper">
        <div class="empty-state">
          <i class="bi bi-hourglass-split"></i>
          Loading entries...
        </div>
      </div>
    </div>
  </div>
  <!-- ADD MODAL -->
  <div class="modal fade" id="modal-add-testwash" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header" style="border-bottom:1px solid var(--border);">
          <h5 class="modal-title"><i class="bi bi-car-front"></i> Log Testwash</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="form-add-testwash">
          <div class="modal-body">
            <div class="mb-3">
              <label class="form-label">Carwash Code</label>
              <input type="text" class="form-control" name="carwashCode" placeholder="e.g. CW-10234" required>
            </div>
            <div class="row">
              <div class="col-6 mb-3">
                <label class="form-label">Date</label>
                <input type="date" class="form-control" name="date" required>
              </div>
              <div class="col-6 mb-3">
                <label class="form-label">Time</label>
                <input type="time" class="form-control" name="time" required>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Issued To (Employee)</label>
              <input type="text" class="form-control" name="issuedTo" placeholder="Employee name" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Issued By</label>
              <input type="text" class="form-control" name="issuedBy" placeholder="Your name" required>
            </div>
            <div class="mb-1">
              <label class="form-label">Notes (optional)</label>
              <textarea class="form-control" name="notes" rows="2" placeholder="Any remarks..."></textarea>
            </div>
          </div>
          <div class="modal-footer" style="border-top:1px solid var(--border);">
            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn-add"><i class="bi bi-check-circle"></i> Save Entry</button>
          </div>
        </form>
      </div>
    </div>
  </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const now = new Date();
  let currentMonth = now.getMonth() + 1; // 1-12
  let currentYear = now.getFullYear();
  const monthNames = ["January","February","March","April","May","June",
    "July","August","September","October","November","December"];
  function updateMonthLabel() {
    document.getElementById('current-month-label').textContent =
      `${monthNames[currentMonth - 1]} ${currentYear}`;
  }
  function changeMonth(delta) {
    currentMonth += delta;
    if (currentMonth > 12) { currentMonth = 1; currentYear++; }
    if (currentMonth < 1) { currentMonth = 12; currentYear--; }
    loadLogs();
  }
  async function loadLogs() {
    updateMonthLabel();
    const wrapper = document.getElementById('table-wrapper');
    wrapper.innerHTML = `<div class="empty-state"><i class="bi bi-hourglass-split"></i> Loading entries...</div>`;
    try {
      const res = await fetch(`/api/testwash?month=${currentMonth}&year=${currentYear}`);
      const data = await res.json();
      if (!data.success || data.logs.length === 0) {
        wrapper.innerHTML = `<div class="empty-state"><i class="bi bi-inbox"></i> No testwash entries for this month.</div>`;
        return;
      }
      let rows = data.logs.map(log => {
        const d = new Date(log.date);
        const dateStr = d.toLocaleDateString('en-US', { day:'2-digit', month:'short', year:'numeric' });
        return `
          <tr>
            <td>${dateStr}</td>
            <td>${log.time}</td>
            <td><span class="badge-code">${log.carwashCode}</span></td>
            <td>${log.issuedTo}</td>
            <td>${log.issuedBy}</td>
            <td>${log.notes || '-'}</td>
            <td><button class="delete-btn" onclick="deleteLog('${log._id}')"><i class="bi bi-trash"></i></button></td>
          </tr>
        `;
      }).join('');
      wrapper.innerHTML = `
        <table class="testwash-table">
          <thead>
            <tr>
              <th>Date</th><th>Time</th><th>Code</th><th>Issued To</th><th>Issued By</th><th>Notes</th><th></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    } catch (err) {
      console.error(err);
      wrapper.innerHTML = `<div class="empty-state"><i class="bi bi-exclamation-triangle"></i> Failed to load entries.</div>`;
    }
  }
  async function deleteLog(id) {
    if (!confirm('Delete this entry?')) return;
    try {
      await fetch(`/api/testwash/${id}`, { method: 'DELETE' });
      loadLogs();
    } catch (err) {
      alert('Failed to delete entry');
    }
  }
  document.getElementById('form-add-testwash').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const payload = {
      carwashCode: form.carwashCode.value,
      date: form.date.value,
      time: form.time.value,
      issuedTo: form.issuedTo.value,
      issuedBy: form.issuedBy.value,
      notes: form.notes.value
    };
    try {
      const res = await fetch('/api/testwash', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (data.success) {
        bootstrap.Modal.getInstance(document.getElementById('modal-add-testwash')).hide();
        form.reset();
        // Jump to the month the entry belongs to, so it's visible
        const d = new Date(payload.date);
        currentMonth = d.getMonth() + 1;
        currentYear = d.getFullYear();
        loadLogs();
      } else {
        alert(data.message || 'Failed to save entry');
      }
    } catch (err) {
      console.error(err);
      alert('Something went wrong');
    }
  });
  loadLogs();
</script>
</body>
</html>
