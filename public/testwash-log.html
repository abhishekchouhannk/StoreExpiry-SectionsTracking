<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Testwash Log — Store Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: #e4e2dc;
      --text: #1a1a18;
      --muted: #8a8880;
      --pill-r: 999px;
    }
    * { box-sizing: border-box; }
    body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); min-height: 100vh; }
    /* ── TOP BAR (injected by nav.js) ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg); border-bottom: 1px solid var(--border);
      padding: 0 1.4rem; height: 54px;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }
    .site-switcher { display: flex; gap: 5px; flex-wrap: wrap; }
    .site-btn {
      font-family: 'Syne', sans-serif; font-size: .7rem; font-weight: 600;
      letter-spacing: .05em; text-transform: uppercase; padding: 5px 12px;
      border-radius: var(--pill-r); border: 1.5px solid var(--border);
      color: var(--muted); background: transparent; cursor: pointer;
      transition: all .16s ease; white-space: nowrap;
    }
    .site-btn:hover { border-color: var(--text); color: var(--text); }
    .site-btn.active { background: var(--text); border-color: var(--text); color: #fff; }
    .hamburger-btn {
      width: 36px; height: 36px; border-radius: 9px;
      border: 1.5px solid var(--border); background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all .15s; flex-shrink: 0; color: var(--text);
    }
    .hamburger-btn:hover { border-color: var(--text); background: var(--text); color: #fff; }
    /* ── OFFCANVAS ── */
    #offcanvas-menu { width: 280px !important; background: var(--bg) !important; border-left: 1px solid var(--border) !important; }
    #offcanvas-menu .offcanvas-header { border-bottom: 1px solid var(--border); padding: 1.1rem 1.4rem; }
    #offcanvas-menu .offcanvas-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: .95rem; }
    .menu-label { font-family: 'Syne', sans-serif; font-size: .62rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); padding: 1.1rem 1.4rem .4rem; }
    .menu-item { display: flex; align-items: center; gap: .7rem; padding: .6rem 1.4rem; font-size: .87rem; font-weight: 500; color: var(--text); text-decoration: none; cursor: pointer; border: none; background: none; width: 100%; text-align: left; transition: background .1s; }
    .menu-item:hover { background: var(--border); }
    .menu-item i { font-size: .95rem; width: 18px; color: var(--muted); }
    .menu-footer { position: absolute; bottom: 0; left: 0; right: 0; padding: 1.1rem 1.4rem; border-top: 1px solid var(--border); }
    .menu-footer p { font-size: .76rem; color: var(--muted); margin: 0 0 .5rem; line-height: 1.7; }
    .menu-footer a { color: var(--text); font-weight: 600; text-decoration: none; }
    .menu-footer a:hover { text-decoration: underline; }
    /* ── SITE SWITCH OVERLAY ── */
    #site-overlay {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(245,244,240,.7);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
    }
    #site-overlay.active { display: flex; }
    .overlay-spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border); border-top-color: var(--text);
      border-radius: 50%; animation: spin .65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* ── HERO ── */
    .sec-hero {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 1.2rem 1.4rem 1.1rem;
    }
    .back-link {
      display: inline-flex; align-items: center; gap: .35rem;
      font-size: .76rem; font-weight: 600; color: var(--muted);
      text-decoration: none; text-transform: uppercase; letter-spacing: .06em;
      font-family: 'Syne', sans-serif; margin-bottom: .7rem;
      transition: color .12s;
    }
    .back-link:hover { color: var(--text); }
    .hero-row { display: flex; align-items: center; gap: .9rem; }
    .hero-icon { font-size: 2rem; line-height: 1; }
    .hero-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.35rem; letter-spacing: -.02em; margin: 0 0 .15rem; }
    .hero-loc { font-size: .78rem; color: var(--muted); margin: 0; }
    /* ── CONTENT ── */
    .tab-content-area { padding: 1.4rem; }
    /* Toolbar */
    .toolbar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.1rem; gap: .75rem; flex-wrap: wrap; }
    .toolbar-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: .88rem; margin: 0 0 .2rem; }
    .toolbar-sub { font-size: .78rem; color: var(--muted); margin: 0; }
    .toolbar-right { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
    /* Buttons */
    .btn-solid { background: var(--text); color: #fff; border: none; border-radius: 9px; font-family: 'Syne', sans-serif; font-size: .74rem; font-weight: 700; letter-spacing: .04em; padding: .4rem .9rem; cursor: pointer; transition: background .15s; white-space: nowrap; }
    .btn-solid:hover { background: #333; color: #fff; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1.5px solid var(--border); border-radius: 9px; font-size: .78rem; padding: .38rem .85rem; cursor: pointer; }
    .btn-ghost:hover { border-color: #aaa; color: var(--text); }
    /* Select */
    .form-select-sm-custom {
      font-size: .78rem; padding: .35rem .7rem; border-radius: 9px;
      border: 1.5px solid var(--border); background: var(--surface); color: var(--text);
      cursor: pointer;
    }
    .form-select-sm-custom:focus { outline: none; border-color: var(--text); }
    /* ── SEARCH BAR (from dashboard) ── */
    .search-box {
      display: flex; align-items: center; gap: 0.6rem;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 0.6rem 1rem;
      transition: border-color 0.15s; margin-bottom: 1.1rem; max-width: 340px;
    }
    .search-box:focus-within { border-color: var(--text); }
    .search-box i { color: var(--muted); font-size: 0.95rem; flex-shrink: 0; transition: color 0.15s; }
    .search-box:focus-within i { color: var(--text); }
    .search-box input {
      border: none; background: none; outline: none;
      font-family: "DM Sans", sans-serif; font-size: 0.87rem; color: var(--text); width: 100%;
    }
    .search-box input::placeholder { color: var(--muted); }
    /* ── TABLE CARD ── */
    .table-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; overflow: hidden; }
    .table-card table { margin: 0; width: 100%; }
    .table-card thead th { font-family: 'Syne', sans-serif; font-size: .67rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); background: var(--bg); border-bottom: 1px solid var(--border); padding: .6rem 1rem; text-align: left; }
    .table-card tbody td { font-size: .83rem; padding: .65rem 1rem; border-bottom: 1px solid #f0ede8; vertical-align: middle; }
    .table-card tbody tr:last-child td { border-bottom: none; }
    .table-card tbody tr:hover td { background: #faf9f6; }
    .del-row { background: none; border: none; cursor: pointer; color: var(--muted); opacity: 0; padding: 2px 5px; transition: opacity .12s; }
    .table-card tbody tr:hover .del-row { opacity: 1; }
    .del-row:hover { color: #d1453b; }
    /* Pills */
    .tag { font-size: .7rem; font-weight: 500; padding: 2px 8px; border-radius: var(--pill-r); }
    .tag-code { background: var(--bg); color: var(--text); border: 1px solid var(--border); font-weight: 700; letter-spacing: .03em; }
    /* ── MODALS ── */
    .modal-content { border: 1.5px solid var(--border) !important; border-radius: 18px !important; box-shadow: 0 20px 60px rgba(0,0,0,.12) !important; }
    .modal-header { border-bottom: 1px solid var(--border); padding: 1rem 1.3rem; }
    .modal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: .92rem; }
    .modal-body { padding: 1.1rem 1.3rem; }
    .modal-footer { padding: .7rem 1.3rem 1rem; border-top: none; }
    .form-label { font-size: .72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .3rem; display: block; }
    .form-control, .form-select { border: 1.5px solid var(--border); border-radius: 9px; font-size: .87rem; background: var(--bg); color: var(--text); width: 100%; padding: .4rem .7rem; }
    .form-control:focus, .form-select:focus { border-color: var(--text); box-shadow: none; background: #fff; outline: none; }
    textarea.form-control { resize: vertical; }
    .mb-3 { margin-bottom: .85rem !important; }
    /* Empty state */
    .empty-state { text-align: center; padding: 2.5rem 1rem; color: var(--muted); font-size: .85rem; font-style: italic; }
    /* ── MOBILE SITE DROPDOWN ── */
    .site-dropdown-wrap { display: none; position: relative; }
    .site-dropdown-btn {
      font-family: 'Syne', sans-serif; font-size: .75rem; font-weight: 700;
      letter-spacing: .04em; text-transform: uppercase;
      padding: 6px 12px 6px 14px; border-radius: var(--pill-r);
      border: 1.5px solid var(--text); background: var(--text); color: #fff;
      cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap;
    }
    .site-dropdown-btn i { font-size: .7rem; transition: transform .2s; }
    .site-dropdown-btn.open i { transform: rotate(180deg); }
    .site-dropdown-list {
      display: none; position: absolute; top: calc(100% + 6px); left: 0;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 5px; min-width: 160px;
      box-shadow: 0 8px 24px rgba(0,0,0,.1); z-index: 200;
    }
    .site-dropdown-list.open { display: block; }
    .site-dropdown-item {
      font-family: 'Syne', sans-serif; font-size: .72rem; font-weight: 600;
      letter-spacing: .04em; text-transform: uppercase;
      padding: 7px 12px; border-radius: 8px; cursor: pointer; border: none;
      background: none; width: 100%; text-align: left; color: var(--muted);
      transition: background .12s, color .12s;
    }
    .site-dropdown-item:hover { background: var(--bg); color: var(--text); }
    .site-dropdown-item.active { color: var(--text); font-weight: 800; }
    .site-dropdown-item.active::before { content: '✓ '; }
    @media (max-width: 600px) {
      .site-switcher { display: none; }
      .site-dropdown-wrap { display: block; }
      .topbar { padding: 0 1rem; }
      .tab-content-area { padding: 1rem; }
      .sec-hero { padding: 1rem; }
      .search-box { max-width: 100%; }
    }
  </style>
</head>
<body>
  <!-- ── HERO ── -->
  <div class="sec-hero">
    <a href="/dashboard.html" class="back-link" onclick="event.preventDefault();window.location='/dashboard.html'"><i class="bi bi-arrow-left"></i> Dashboard</a>
    <div class="hero-row">
      <div class="hero-icon">🚗</div>
      <div>
        <p class="hero-name">Testwash Log</p>
        <p class="hero-loc">Track free carwashes issued to employees</p>
      </div>
    </div>
  </div>
  <!-- ── CONTENT ── -->
  <div class="tab-content-area">
    <div class="toolbar">
      <div>
        <p class="toolbar-title">Testwash Log</p>
        <p class="toolbar-sub" id="tw-month-summary">Loading…</p>
      </div>
      <div class="toolbar-right">
        <select class="form-select-sm-custom" id="tw-month"></select>
        <button class="btn-solid" data-bs-toggle="modal" data-bs-target="#modal-testwash"><i class="bi bi-plus-lg me-1"></i>Log Testwash</button>
      </div>
    </div>
    <div class="search-box">
      <i class="bi bi-search"></i>
      <input type="text" id="tw-search" placeholder="Search employee or code…" autocomplete="off"/>
    </div>
    <div id="tw-table-wrap"><div class="empty-state">Loading…</div></div>
  </div>
  <!-- ═══ Modal: Log Testwash ═══ -->
  <div class="modal fade" id="modal-testwash" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="tw-modal-title">Log a Testwash</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="f-tw-id"/>
          <div class="mb-3"><label class="form-label">Carwash Code</label><input type="text" class="form-control" id="f-tw-code" placeholder="e.g. CW1024"/></div>
          <div class="row g-2">
            <div class="col-6 mb-3"><label class="form-label">Date Issued</label><input type="date" class="form-control" id="f-tw-date"/></div>
            <div class="col-6 mb-3"><label class="form-label">Time Issued</label><input type="time" class="form-control" id="f-tw-time"/></div>
          </div>
          <div class="mb-3"><label class="form-label">Issued To</label><input type="text" class="form-control" id="f-tw-issued-to" placeholder="Employee name"/></div>
          <div class="mb-3"><label class="form-label">Issued By</label><input type="text" class="form-control" id="f-tw-issued-by" placeholder="Manager / staff name"/></div>
          <div class="mb-3"><label class="form-label">Notes</label><textarea class="form-control" rows="2" id="f-tw-notes" placeholder="Optional notes…"></textarea></div>
        </div>
        <div class="modal-footer">
          <button class="btn-ghost" data-bs-dismiss="modal">Cancel</button>
          <button class="btn-solid" id="f-tw-save">Save</button>
        </div>
      </div>
    </div>
  </div>
  <script>window.NAV_ACTIVE = 'testwash';</script>
  <script src="js/nav.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/testwash-log.js"></script>
</body>
</html>
