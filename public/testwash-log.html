<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testwash Log</title>
<!-- Fallback theme variables — delete this block if your global stylesheet
     already defines --bg, --text, --muted, --border, etc. -->
<style>
  :root{
    --bg:#f5f6f8;
    --surface:#ffffff;
    --text:#1b1e24;
    --muted:#6b7280;
    --border:#e4e6ea;
    --primary:#2f6fed;
    --primary-dark:#2457c2;
    --danger:#e5484d;
    --success:#1aa179;
    --radius:12px;
    --shadow:0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  }
</style>
<!-- ⬇ point this to your actual global stylesheet so colors/fonts stay in sync -->
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<style>
  *{box-sizing:border-box;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family: inherit, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    margin:0;
    min-height:100vh;
  }
  .page-wrap{
    max-width:1100px;
    margin:0 auto;
    padding:1.5rem 1.25rem 3rem;
  }
  /* Header */
  .page-header{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:1rem;
    margin-bottom:1.5rem;
    flex-wrap:wrap;
  }
  .page-header h1{
    font-size:1.5rem;
    font-weight:700;
    margin:0 0 .2rem;
    display:flex;
    align-items:center;
    gap:.5rem;
  }
  .page-header p{
    margin:0;
    color:var(--muted);
    font-size:.9rem;
  }
  .btn-back{
    display:inline-flex;
    align-items:center;
    gap:.4rem;
    background:var(--surface);
    border:1.5px solid var(--border);
    color:var(--text);
    font-weight:600;
    font-size:.82rem;
    padding:.5rem .9rem;
    border-radius:10px;
    text-decoration:none;
    cursor:pointer;
  }
  .btn-back:hover{ border-color:var(--primary); color:var(--primary); }
  .btn-primary-custom{
    background:var(--primary);
    border:none;
    color:#fff;
    font-weight:600;
    font-size:.85rem;
    padding:.6rem 1.1rem;
    border-radius:10px;
    display:inline-flex;
    align-items:center;
    gap:.4rem;
    cursor:pointer;
    transition:background .15s;
  }
  .btn-primary-custom:hover{ background:var(--primary-dark); }
  /* Stat cards */
  .stats-row{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(180px,1fr));
    gap:.9rem;
    margin-bottom:1.5rem;
  }
  .stat-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:1rem 1.1rem;
    box-shadow:var(--shadow);
  }
  .stat-card .label{
    font-size:.75rem;
    color:var(--muted);
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:.03em;
    margin-bottom:.3rem;
  }
  .stat-card .value{
    font-size:1.6rem;
    font-weight:700;
  }
  /* Month navigator */
  .month-bar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:1rem;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:.75rem 1rem;
    margin-bottom:1rem;
    flex-wrap:wrap;
  }
  .month-nav{
    display:flex;
    align-items:center;
    gap:.5rem;
  }
  .month-nav button{
    width:34px;height:34px;
    border-radius:8px;
    border:1.5px solid var(--border);
    background:var(--surface);
    color:var(--text);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .month-nav button:hover{ border-color:var(--primary); color:var(--primary); }
  .month-label{
    font-weight:700;
    font-size:1rem;
    min-width:150px;
    text-align:center;
  }
  .today-btn{
    font-size:.78rem;
    font-weight:600;
    color:var(--primary);
    background:none;
    border:none;
    cursor:pointer;
  }
  .search-box{
    position:relative;
    flex:1;
    max-width:260px;
  }
  .search-box input{
    width:100%;
    padding:.5rem .8rem .5rem 2.1rem;
    border:1.5px solid var(--border);
    border-radius:8px;
    font-size:.85rem;
    background:var(--bg);
    color:var(--text);
  }
  .search-box i{
    position:absolute;
    left:.7rem; top:50%;
    transform:translateY(-50%);
    color:var(--muted);
    font-size:.85rem;
  }
  /* Table card */
  .table-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    overflow:hidden;
    box-shadow:var(--shadow);
  }
  table.testwash-table{
    width:100%;
    border-collapse:collapse;
  }
  table.testwash-table thead th{
    text-align:left;
    font-size:.72rem;
    text-transform:uppercase;
    letter-spacing:.04em;
    color:var(--muted);
    font-weight:700;
    padding:.75rem 1rem;
    border-bottom:1px solid var(--border);
    background:var(--bg);
  }
  table.testwash-table tbody td{
    padding:.75rem 1rem;
    font-size:.88rem;
    border-bottom:1px solid var(--border);
    vertical-align:middle;
  }
  table.testwash-table tbody tr:last-child td{ border-bottom:none; }
  table.testwash-table tbody tr:hover{ background:var(--bg); }
  .code-badge{
    display:inline-block;
    background:#eef3ff;
    color:var(--primary-dark);
    font-weight:700;
    font-size:.78rem;
    padding:.25rem .55rem;
    border-radius:6px;
    letter-spacing:.03em;
  }
  .row-actions{
    display:flex;
    gap:.4rem;
  }
  .icon-btn{
    width:30px;height:30px;
    border-radius:7px;
    border:1.5px solid var(--border);
    background:var(--surface);
    color:var(--muted);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    font-size:.85rem;
  }
  .icon-btn:hover{ border-color:var(--primary); color:var(--primary); }
  .icon-btn.danger:hover{ border-color:var(--danger); color:var(--danger); }
  .empty-state{
    text-align:center;
    padding:3rem 1rem;
    color:var(--muted);
  }
  .empty-state i{
    font-size:2.2rem;
    margin-bottom:.6rem;
    display:block;
  }
  /* Modal tweaks to match theme */
  .modal-content{
    border-radius:var(--radius);
    border:1px solid var(--border);
  }
  .modal-header, .modal-footer{ border-color:var(--border); }
  .form-label{
    font-size:.82rem;
    font-weight:600;
    color:var(--text);
  }
  .form-control{
    border-radius:8px;
    border:1.5px solid var(--border);
  }
  .form-control:focus{
    border-color:var(--primary);
    box-shadow:0 0 0 3px rgba(47,111,237,.12);
  }
  #toast-container{
    position:fixed;
    bottom:1.25rem;
    right:1.25rem;
    z-index:2000;
  }
</style>
</head>
<body>
<div class="page-wrap">
  <!-- Header -->
  <div class="page-header">
    <div>
      <h1><i class="bi bi-car-front" style="color:var(--primary);"></i> Testwash Log</h1>
      <p>Track free carwashes issued to employees</p>
    </div>
    <div style="display:flex; gap:.6rem; flex-wrap:wrap;">
      <a href="/dashboard.html" class="btn-back"><i class="bi bi-arrow-left"></i> Dashboard</a>
      <button class="btn-primary-custom" onclick="openAddModal()">
        <i class="bi bi-plus-lg"></i> New Testwash
      </button>
    </div>
  </div>
  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="label">Issued This Month</div>
      <div class="value" id="stat-total">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Unique Employees</div>
      <div class="value" id="stat-unique">0</div>
    </div>
  </div>
  <!-- Month navigator -->
  <div class="month-bar">
    <div class="month-nav">
      <button onclick="changeMonth(-1)"><i class="bi bi-chevron-left"></i></button>
      <div class="month-label" id="month-label">—</div>
      <button onclick="changeMonth(1)"><i class="bi bi-chevron-right"></i></button>
      <button class="today-btn" onclick="goToCurrentMonth()" style="width:auto;border:none;">This Month</button>
    </div>
    <div class="search-box">
      <i class="bi bi-search"></i>
      <input type="text" id="search-input" placeholder="Search employee or code..." oninput="renderTable()">
    </div>
  </div>
  <!-- Table -->
  <div class="table-card">
    <div id="table-wrapper">
      <table class="testwash-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Time</th>
            <th>Carwash Code</th>
            <th>Issued To</th>
            <th>Issued By</th>
            <th>Notes</th>
            <th style="text-align:right;">Actions</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <!-- rows injected here -->
        </tbody>
      </table>
    </div>
    <div id="empty-state" class="empty-state" style="display:none;">
      <i class="bi bi-droplet"></i>
      No testwashes logged for this month yet.
    </div>
  </div>
</div>
<!-- Add / Edit Modal -->
<div class="modal fade" id="modal-testwash" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modal-title">New Testwash</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="testwash-form">
        <div class="modal-body">
          <input type="hidden" id="edit-id">
          <div class="mb-3">
            <label class="form-label">Carwash Code</label>
            <input type="text" class="form-control" id="input-code" placeholder="e.g. CW1024" required>
          </div>
          <div class="row">
            <div class="col-6 mb-3">
              <label class="form-label">Date</label>
              <input type="date" class="form-control" id="input-date" required>
            </div>
            <div class="col-6 mb-3">
              <label class="form-label">Time</label>
              <input type="time" class="form-control" id="input-time" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Issued To (Employee)</label>
            <input type="text" class="form-control" id="input-issued-to" placeholder="Employee name" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Issued By</label>
            <input type="text" class="form-control" id="input-issued-by" placeholder="Manager / staff name" required>
          </div>
          <div class="mb-1">
            <label class="form-label">Notes <span style="color:var(--muted); font-weight:400;">(optional)</span></label>
            <textarea class="form-control" id="input-notes" rows="2" placeholder="Any additional context..."></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn-primary-custom" style="border-radius:8px;">
            <i class="bi bi-check-lg"></i> <span id="submit-label">Save</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const API_BASE = '/api/testwash';
  const now = new Date();
  let currentMonth = now.getMonth();
  let currentYear = now.getFullYear();
  let currentLogs = [];
  const monthNames = ['January','February','March','April','May','June',
    'July','August','September','October','November','December'];
  const testwashModalEl = document.getElementById('modal-testwash');
  const testwashModal = new bootstrap.Modal(testwashModalEl);
  document.addEventListener('DOMContentLoaded', () => {
    fetchLogs();
  });
  function updateMonthLabel(){
    document.getElementById('month-label').textContent = `${monthNames[currentMonth]} ${currentYear}`;
  }
  function changeMonth(delta){
    currentMonth += delta;
    if(currentMonth < 0){ currentMonth = 11; currentYear--; }
    if(currentMonth > 11){ currentMonth = 0; currentYear++; }
    fetchLogs();
  }
  function goToCurrentMonth(){
    currentMonth = now.getMonth();
    currentYear = now.getFullYear();
    fetchLogs();
  }
  async function fetchLogs(){
    updateMonthLabel();
    try{
      const res = await fetch(`${API_BASE}?month=${currentMonth}&year=${currentYear}`);
      const json = await res.json();
      if(!json.success) throw new Error(json.message || 'Failed to load');
      currentLogs = json.data;
      renderTable();
      renderStats();
    }catch(err){
      console.error(err);
      showToast('Failed to load testwash logs', 'danger');
    }
  }
  function renderStats(){
    document.getElementById('stat-total').textContent = currentLogs.length;
    const unique = new Set(currentLogs.map(l => l.issuedTo.trim().toLowerCase()));
    document.getElementById('stat-unique').textContent = unique.size;
  }
  function renderTable(){
    const search = document.getElementById('search-input').value.trim().toLowerCase();
    const filtered = currentLogs.filter(l => {
      if(!search) return true;
      return l.issuedTo.toLowerCase().includes(search)
        || l.carwashCode.toLowerCase().includes(search)
        || l.issuedBy.toLowerCase().includes(search);
    });
    const tbody = document.getElementById('table-body');
    const emptyState = document.getElementById('empty-state');
    const tableWrapper = document.getElementById('table-wrapper');
    if(filtered.length === 0){
      tbody.innerHTML = '';
      tableWrapper.style.display = 'none';
      emptyState.style.display = 'block';
      return;
    }
    tableWrapper.style.display = 'block';
    emptyState.style.display = 'none';
    tbody.innerHTML = filtered.map(log => {
      const d = new Date(log.issuedAt);
      const dateStr = d.toLocaleDateString('en-US', { day:'2-digit', month:'short', year:'numeric' });
      const timeStr = d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
      return `
        <tr>
          <td>${dateStr}</td>
          <td>${timeStr}</td>
          <td><span class="code-badge">${escapeHtml(log.carwashCode)}</span></td>
          <td>${escapeHtml(log.issuedTo)}</td>
          <td>${escapeHtml(log.issuedBy)}</td>
          <td style="color:var(--muted); max-width:180px;">${escapeHtml(log.notes || '—')}</td>
          <td>
            <div class="row-actions" style="justify-content:flex-end;">
              <button class="icon-btn" onclick='openEditModal(${JSON.stringify(log)})' title="Edit">
                <i class="bi bi-pencil"></i>
              </button>
              <button class="icon-btn danger" onclick="deleteLog('${log._id}')" title="Delete">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </td>
        </tr>
      `;
    }).join('');
  }
  function escapeHtml(str){
    if(!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
  }
  function openAddModal(){
    document.getElementById('modal-title').textContent = 'New Testwash';
    document.getElementById('submit-label').textContent = 'Save';
    document.getElementById('testwash-form').reset();
    document.getElementById('edit-id').value = '';
    const today = new Date();
    document.getElementById('input-date').value = today.toISOString().split('T')[0];
    document.getElementById('input-time').value =
      today.toTimeString().slice(0,5);
    testwashModal.show();
  }
  function openEditModal(log){
    document.getElementById('modal-title').textContent = 'Edit Testwash';
    document.getElementById('submit-label').textContent = 'Update';
    document.getElementById('edit-id').value = log._id;
    const d = new Date(log.issuedAt);
    document.getElementById('input-code').value = log.carwashCode;
    document.getElementById('input-date').value = d.toISOString().split('T')[0];
    document.getElementById('input-time').value = d.toTimeString().slice(0,5);
    document.getElementById('input-issued-to').value = log.issuedTo;
    document.getElementById('input-issued-by').value = log.issuedBy;
    document.getElementById('input-notes').value = log.notes || '';
    testwashModal.show();
  }
  document.getElementById('testwash-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = document.getElementById('edit-id').value;
    const payload = {
      carwashCode: document.getElementById('input-code').value.trim(),
      date: document.getElementById('input-date').value,
      time: document.getElementById('input-time').value,
      issuedTo: document.getElementById('input-issued-to').value.trim(),
      issuedBy: document.getElementById('input-issued-by').value.trim(),
      notes: document.getElementById('input-notes').value.trim()
    };
    try{
      const res = await fetch(id ? `${API_BASE}/${id}` : API_BASE, {
        method: id ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const json = await res.json();
      if(!json.success) throw new Error(json.message || 'Save failed');
      testwashModal.hide();
      showToast(id ? 'Testwash updated' : 'Testwash logged successfully', 'success');
      // If the saved entry belongs to a different month than what's showing,
      // jump to that month so the user can see it.
      const savedDate = new Date(json.data.issuedAt);
      if(savedDate.getMonth() !== currentMonth || savedDate.getFullYear() !== currentYear){
        currentMonth = savedDate.getMonth();
        currentYear = savedDate.getFullYear();
      }
      fetchLogs();
    }catch(err){
      console.error(err);
      showToast(err.message || 'Something went wrong', 'danger');
    }
  });
  async function deleteLog(id){
    if(!confirm('Delete this testwash log entry? This cannot be undone.')) return;
    try{
      const res = await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
      const json = await res.json();
      if(!json.success) throw new Error(json.message || 'Delete failed');
      showToast('Entry deleted', 'success');
      fetchLogs();
    }catch(err){
      console.error(err);
      showToast(err.message || 'Failed to delete entry', 'danger');
    }
  }
  function showToast(message, type = 'success'){
    const colors = { success:'#1aa179', danger:'#e5484d' };
    const toast = document.createElement('div');
    toast.style.cssText = `
      background:${colors[type] || colors.success};
      color:#fff; padding:.7rem 1rem; border-radius:8px;
      margin-top:.5rem; font-size:.85rem; font-weight:600;
      box-shadow:0 4px 12px rgba(0,0,0,.15);
      opacity:0; transform:translateY(10px); transition:all .25s;
    `;
    toast.textContent = message;
    document.getElementById('toast-container').appendChild(toast);
    requestAnimationFrame(() => {
      toast.style.opacity = '1';
      toast.style.transform = 'translateY(0)';
    });
    setTimeout(() => {
      toast.style.opacity = '0';
      setTimeout(() => toast.remove(), 250);
    }, 2800);
  }
</script>
</body>
</html>
