<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Section — Store Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: #e4e2dc;
      --text: #1a1a18;
      --muted: #8a8880;
      --pill-r: 999px;
    }
    * { box-sizing: border-box; }
    body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); min-height: 100vh; }

    /* ── TOP BAR ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg); border-bottom: 1px solid var(--border);
      padding: 0 1.4rem; height: 54px;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }
    .site-switcher { display: flex; gap: 5px; flex-wrap: wrap; }
    .site-btn {
      font-family: 'Syne', sans-serif; font-size: .7rem; font-weight: 600;
      letter-spacing: .05em; text-transform: uppercase; padding: 5px 12px;
      border-radius: var(--pill-r); border: 1.5px solid var(--border);
      color: var(--muted); background: transparent; cursor: pointer;
      transition: all .16s ease; white-space: nowrap;
    }
    .site-btn:hover { border-color: var(--text); color: var(--text); }
    .site-btn.active { background: var(--text); border-color: var(--text); color: #fff; }
    .hamburger-btn {
      width: 36px; height: 36px; border-radius: 9px;
      border: 1.5px solid var(--border); background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all .15s; flex-shrink: 0; color: var(--text);
    }
    .hamburger-btn:hover { border-color: var(--text); background: var(--text); color: #fff; }

    /* ── OFFCANVAS ── */
    #offcanvas-menu { width: 280px !important; background: var(--bg) !important; border-left: 1px solid var(--border) !important; }
    #offcanvas-menu .offcanvas-header { border-bottom: 1px solid var(--border); padding: 1.1rem 1.4rem; }
    #offcanvas-menu .offcanvas-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: .95rem; }
    .menu-label { font-family: 'Syne', sans-serif; font-size: .62rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); padding: 1.1rem 1.4rem .4rem; }
    .menu-item { display: flex; align-items: center; gap: .7rem; padding: .6rem 1.4rem; font-size: .87rem; font-weight: 500; color: var(--text); text-decoration: none; cursor: pointer; border: none; background: none; width: 100%; text-align: left; transition: background .1s; }
    .menu-item:hover { background: var(--border); }
    .menu-item i { font-size: .95rem; width: 18px; color: var(--muted); }
    .menu-footer { position: absolute; bottom: 0; left: 0; right: 0; padding: 1.1rem 1.4rem; border-top: 1px solid var(--border); }
    .menu-footer p { font-size: .76rem; color: var(--muted); margin: 0; line-height: 1.7; }
    .menu-footer a { color: var(--text); font-weight: 600; text-decoration: none; }
    .menu-footer a:hover { text-decoration: underline; }

    /* ── SECTION HERO ── */
    .sec-hero {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 1.2rem 1.4rem 1.1rem;
    }
    .back-link {
      display: inline-flex; align-items: center; gap: .35rem;
      font-size: .76rem; font-weight: 600; color: var(--muted);
      text-decoration: none; text-transform: uppercase; letter-spacing: .06em;
      font-family: 'Syne', sans-serif; margin-bottom: .7rem;
      transition: color .12s;
    }
    .back-link:hover { color: var(--text); }
    .hero-row { display: flex; align-items: center; gap: .9rem; }
    .hero-icon { font-size: 2rem; line-height: 1; }
    .hero-name { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.35rem; letter-spacing: -.02em; margin: 0 0 .15rem; }
    .hero-loc { font-size: .78rem; color: var(--muted); margin: 0; }

    /* ── TAB BAR ── */
    .tab-bar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 1.4rem;
      display: flex; gap: 0; overflow-x: auto; scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      font-family: 'Syne', sans-serif; font-size: .72rem; font-weight: 700;
      letter-spacing: .05em; text-transform: uppercase;
      padding: .75rem .9rem; border: none; background: none;
      color: var(--muted); border-bottom: 2.5px solid transparent;
      cursor: pointer; white-space: nowrap; transition: all .15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--text); }

    /* ── CONTENT ── */
    .tab-content-area { padding: 1.4rem; }
    .tab-pane-custom { display: none; }
    .tab-pane-custom.active { display: block; }

    /* Toolbar */
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.1rem; gap: .75rem; }
    .toolbar-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: .88rem; margin: 0; }
    .toolbar-right { display: flex; align-items: center; gap: .5rem; }

    /* Buttons */
    .btn-solid { background: var(--text); color: #fff; border: none; border-radius: 9px; font-family: 'Syne', sans-serif; font-size: .74rem; font-weight: 700; letter-spacing: .04em; padding: .4rem .9rem; cursor: pointer; transition: background .15s; white-space: nowrap; }
    .btn-solid:hover { background: #333; color: #fff; }
    .btn-solid-red { background: #d1453b; }
    .btn-solid-red:hover { background: #b83530; }
    .btn-solid-amber { background: #c47a1a; color: #fff; }
    .btn-solid-amber:hover { background: #a66515; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1.5px solid var(--border); border-radius: 9px; font-size: .78rem; padding: .38rem .85rem; cursor: pointer; }
    .btn-ghost:hover { border-color: #aaa; color: var(--text); }

    /* Select */
    .form-select-sm-custom {
      font-size: .78rem; padding: .35rem .7rem; border-radius: 9px;
      border: 1.5px solid var(--border); background: var(--surface); color: var(--text);
      cursor: pointer;
    }
    .form-select-sm-custom:focus { outline: none; border-color: var(--text); }

    /* ── WEEK CARDS ── */
    .week-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
    .week-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 14px; overflow: hidden;
    }
    .week-card-head {
      display: flex; align-items: center; gap: .6rem;
      padding: .65rem 1rem; border-bottom: 1px solid var(--border);
    }
    .week-num {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-size: .72rem; font-weight: 800;
      flex-shrink: 0;
    }
    .wn-done    { background: #dcfce7; color: #166534; }
    .wn-missed  { background: #fee2e2; color: #b91c1c; }
    .wn-pending { background: #f1f5f9; color: #64748b; }
    .week-label { font-family: 'Syne', sans-serif; font-size: .78rem; font-weight: 700; }
    .week-status {
      margin-left: auto; font-size: .67rem; font-weight: 600;
      letter-spacing: .04em; text-transform: uppercase; padding: 2px 8px;
      border-radius: var(--pill-r);
    }
    .ws-done    { background: #dcfce7; color: #166534; }
    .ws-missed  { background: #fee2e2; color: #b91c1c; }
    .ws-pending { background: #f1f5f9; color: #64748b; }
    .week-del { background: none; border: none; cursor: pointer; color: var(--muted); padding: 2px 4px; opacity: 0; transition: opacity .15s; }
    .week-card:hover .week-del { opacity: 1; }
    .week-del:hover { color: #d1453b; }
    .week-body { padding: .75rem 1rem; }
    .week-row { display: flex; gap: .5rem; margin-bottom: .35rem; font-size: .8rem; }
    .week-row:last-child { margin-bottom: 0; }
    .wr-key { color: var(--muted); font-weight: 500; width: 90px; flex-shrink: 0; }
    .wr-val { color: var(--text); }
    .week-empty { font-size: .8rem; color: var(--muted); font-style: italic; }

    /* ── TABLE CARD ── */
    .table-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; overflow: hidden; }
    .table-card table { margin: 0; }
    .table-card thead th { font-family: 'Syne', sans-serif; font-size: .67rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); background: var(--bg); border-bottom: 1px solid var(--border); padding: .6rem 1rem; }
    .table-card tbody td { font-size: .83rem; padding: .65rem 1rem; border-bottom: 1px solid #f0ede8; vertical-align: middle; }
    .table-card tbody tr:last-child td { border-bottom: none; }
    .table-card tbody tr:hover td { background: #faf9f6; }
    .del-row { background: none; border: none; cursor: pointer; color: var(--muted); opacity: 0; padding: 2px 5px; transition: opacity .12s; }
    .table-card tbody tr:hover .del-row { opacity: 1; }
    .del-row:hover { color: #d1453b; }

    /* Pills in table */
    .tag { font-size: .7rem; font-weight: 500; padding: 2px 8px; border-radius: var(--pill-r); }
    .tag-green  { background: #dcfce7; color: #166534; }
    .tag-red    { background: #fee2e2; color: #b91c1c; }
    .tag-amber  { background: #fef3c7; color: #92400e; }

    /* ── MODALS ── */
    .modal-content { border: 1.5px solid var(--border) !important; border-radius: 18px !important; box-shadow: 0 20px 60px rgba(0,0,0,.12) !important; }
    .modal-header { border-bottom: 1px solid var(--border); padding: 1rem 1.3rem; }
    .modal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: .92rem; }
    .modal-body { padding: 1.1rem 1.3rem; }
    .modal-footer { padding: .7rem 1.3rem 1rem; border-top: none; }
    .form-label { font-size: .72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .3rem; display: block; }
    .form-control, .form-select { border: 1.5px solid var(--border); border-radius: 9px; font-size: .87rem; background: var(--bg); color: var(--text); width: 100%; padding: .4rem .7rem; }
    .form-control:focus, .form-select:focus { border-color: var(--text); box-shadow: none; background: #fff; outline: none; }
    textarea.form-control { resize: vertical; }
    .form-check-input { border: 1.5px solid var(--border); }
    .form-check-input:checked { background-color: var(--text); border-color: var(--text); }
    .form-check-label { font-size: .84rem; }
    .mb-3 { margin-bottom: .85rem !important; }

    /* Empty state */
    .empty-state { text-align: center; padding: 2.5rem 1rem; color: var(--muted); font-size: .85rem; font-style: italic; }

    @media (max-width: 480px) {
      .topbar { padding: 0 1rem; }
      .tab-content-area { padding: 1rem; }
      .sec-hero { padding: 1rem; }
    }
  </style>
</head>
<body>

  <!-- ── TOP BAR ── -->
  <div class="topbar">
    <div class="site-switcher" id="site-switcher">
      <button class="site-btn" data-site="C01158">96 Shell</button>
      <button class="site-btn" data-site="C01288">Riverside Shell</button>
      <button class="site-btn" data-site="C09066">72 Shell</button>
    </div>
    <button class="hamburger-btn" data-bs-toggle="offcanvas" data-bs-target="#offcanvas-menu">
      <i class="bi bi-list"></i>
    </button>
  </div>

  <!-- ── OFFCANVAS ── -->
  <div class="offcanvas offcanvas-end" id="offcanvas-menu" tabindex="-1">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">Menu</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0" style="position:relative;overflow:hidden;">
      <div class="menu-label">Navigate</div>
      <a class="menu-item" href="index.html" data-bs-dismiss="offcanvas">
        <i class="bi bi-grid"></i> All Sections
      </a>
      <div class="menu-footer">
        <p>Made by <a href="https://www.abhishekchouhan.dev" target="_blank" rel="noopener">Abhishek</a><br>
        <a href="https://www.abhishekchouhan.dev" target="_blank" rel="noopener">abhishekchouhan.dev</a></p>
      </div>
    </div>
  </div>

  <!-- ── SECTION HERO ── -->
  <div class="sec-hero">
    <a href="index.html" class="back-link"><i class="bi bi-arrow-left"></i> All Sections</a>
    <div class="hero-row">
      <div class="hero-icon" id="sec-icon">📦</div>
      <div>
        <p class="hero-name" id="sec-title">Loading…</p>
        <p class="hero-loc" id="sec-location"></p>
      </div>
    </div>
  </div>

  <!-- ── TAB BAR ── -->
  <div class="tab-bar" id="tab-bar">
    <button class="tab-btn active" data-tab="cleaning"><i class="bi bi-droplet me-1"></i>Cleaning</button>
    <button class="tab-btn" data-tab="planogram"><i class="bi bi-grid me-1"></i>Planogram</button>
    <button class="tab-btn" data-tab="expiry"><i class="bi bi-calendar-x me-1"></i>Expiry</button>
    <button class="tab-btn" data-tab="orders"><i class="bi bi-cart me-1"></i>Orders</button>
  </div>

  <!-- ── TAB CONTENT ── -->
  <div class="tab-content-area">

    <!-- CLEANING -->
    <div class="tab-pane-custom active" id="tab-cleaning">
      <div class="toolbar">
        <p class="toolbar-title">Cleaning Log</p>
        <div class="toolbar-right">
          <select class="form-select-sm-custom" id="clean-month"></select>
          <button class="btn-solid" data-bs-toggle="modal" data-bs-target="#modal-cleaning"><i class="bi bi-plus-lg me-1"></i>Log Clean</button>
        </div>
      </div>
      <div class="week-grid" id="cleaning-weeks">
        <div class="empty-state">Loading…</div>
      </div>
    </div>

    <!-- PLANOGRAM -->
    <div class="tab-pane-custom" id="tab-planogram">
      <div class="toolbar">
        <p class="toolbar-title">Planogram Integrity</p>
        <div class="toolbar-right">
          <select class="form-select-sm-custom" id="plano-month"></select>
          <button class="btn-solid" data-bs-toggle="modal" data-bs-target="#modal-planogram"><i class="bi bi-plus-lg me-1"></i>Log Check</button>
        </div>
      </div>
      <div class="week-grid" id="plano-weeks">
        <div class="empty-state">Loading…</div>
      </div>
    </div>

    <!-- EXPIRY -->
    <div class="tab-pane-custom" id="tab-expiry">
      <div class="toolbar">
        <p class="toolbar-title">Expiry Log</p>
        <div class="toolbar-right">
          <select class="form-select-sm-custom" id="expiry-filter">
            <option value="all">All Items</option>
            <option value="active">On Shelf</option>
            <option value="removed">Removed</option>
          </select>
          <button class="btn-solid btn-solid-red" data-bs-toggle="modal" data-bs-target="#modal-expiry"><i class="bi bi-plus-lg me-1"></i>Flag Item</button>
        </div>
      </div>
      <div id="expiry-table-wrap"><div class="empty-state">Loading…</div></div>
    </div>

    <!-- ORDERS -->
    <div class="tab-pane-custom" id="tab-orders">
      <div class="toolbar">
        <p class="toolbar-title">Order List</p>
        <div class="toolbar-right">
          <select class="form-select-sm-custom" id="order-filter">
            <option value="all">All</option>
            <option value="pending">Pending</option>
            <option value="ordered">Ordered</option>
          </select>
          <button class="btn-solid btn-solid-amber" data-bs-toggle="modal" data-bs-target="#modal-order"><i class="bi bi-plus-lg me-1"></i>Add Order</button>
        </div>
      </div>
      <div id="order-table-wrap"><div class="empty-state">Loading…</div></div>
    </div>

  </div>

  <!-- ═══ Modal: Log Clean ═══ -->
  <div class="modal fade" id="modal-cleaning" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Log a Clean</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3"><label class="form-label">Week</label><select class="form-select" id="f-clean-week"></select></div>
          <div class="mb-3"><label class="form-label">Date Cleaned</label><input type="date" class="form-control" id="f-clean-date"/></div>
          <div class="mb-3"><label class="form-label">Cleaned By</label><input type="text" class="form-control" id="f-clean-by" placeholder="Staff name"/></div>
          <div class="mb-3"><label class="form-label">Comments</label><textarea class="form-control" rows="2" id="f-clean-comments" placeholder="Notes…"></textarea></div>
        </div>
        <div class="modal-footer">
          <button class="btn-ghost" data-bs-dismiss="modal">Cancel</button>
          <button class="btn-solid" id="f-clean-save">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ Modal: Log Planogram ═══ -->
  <div class="modal fade" id="modal-planogram" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Log Planogram Check</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3"><label class="form-label">Week</label><select class="form-select" id="f-plano-week"></select></div>
          <div class="mb-3"><label class="form-label">Date Checked</label><input type="date" class="form-control" id="f-plano-date"/></div>
          <div class="mb-3"><label class="form-label">Checked By</label><input type="text" class="form-control" id="f-plano-by" placeholder="Staff name"/></div>
          <div class="mb-3"><label class="form-label">Comments</label><textarea class="form-control" rows="2" id="f-plano-comments" placeholder="Issues noted…"></textarea></div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="f-plano-fixed"/>
            <label class="form-check-label" for="f-plano-fixed">Planogram was fixed / corrected</label>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-ghost" data-bs-dismiss="modal">Cancel</button>
          <button class="btn-solid" id="f-plano-save">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ Modal: Flag Expiry ═══ -->
  <div class="modal fade" id="modal-expiry" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Flag Expiry Item</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3"><label class="form-label">Date Found</label><input type="date" class="form-control" id="f-exp-date"/></div>
          <div class="mb-3"><label class="form-label">Item Name</label><input type="text" class="form-control" id="f-exp-item" placeholder="e.g. Lindt 70% Dark Bar"/></div>
          <div class="mb-3"><label class="form-label">Expiry Date on Product</label><input type="date" class="form-control" id="f-exp-expiry"/></div>
          <div class="mb-3"><label class="form-label">Sign Off By</label><input type="text" class="form-control" id="f-exp-sign" placeholder="Staff name"/></div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="f-exp-removed"/>
            <label class="form-check-label" for="f-exp-removed">Item has been removed from shelf</label>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-ghost" data-bs-dismiss="modal">Cancel</button>
          <button class="btn-solid btn-solid-red" id="f-exp-save">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ Modal: Add Order ═══ -->
  <div class="modal fade" id="modal-order" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add Order Item</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3"><label class="form-label">Date</label><input type="date" class="form-control" id="f-ord-date"/></div>
          <div class="mb-3"><label class="form-label">Item Needed</label><input type="text" class="form-control" id="f-ord-item" placeholder="e.g. Toblerone 100g"/></div>
          <div class="mb-3"><label class="form-label">Comments</label><textarea class="form-control" rows="2" id="f-ord-comments" placeholder="Quantity, urgency…"></textarea></div>
        </div>
        <div class="modal-footer">
          <button class="btn-ghost" data-bs-dismiss="modal">Cancel</button>
          <button class="btn-solid btn-solid-amber" id="f-ord-save">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/section.js"></script>
</body>
</html>
