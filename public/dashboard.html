<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Store Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: #e4e2dc;
      --text: #1a1a18;
      --muted: #8a8880;
      --pill-r: 999px;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
    }

    /* ── TOP BAR ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 1.4rem;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .site-switcher { display: flex; gap: 5px; flex-wrap: wrap; }
    .site-btn {
      font-family: 'Syne', sans-serif;
      font-size: .7rem; font-weight: 600;
      letter-spacing: .05em; text-transform: uppercase;
      padding: 5px 12px; border-radius: var(--pill-r);
      border: 1.5px solid var(--border);
      color: var(--muted); background: transparent;
      cursor: pointer; transition: all .16s ease; white-space: nowrap;
    }
    .site-btn:hover { border-color: var(--text); color: var(--text); }
    .site-btn.active { background: var(--text); border-color: var(--text); color: #fff; }

    .hamburger-btn {
      width: 36px; height: 36px; border-radius: 9px;
      border: 1.5px solid var(--border); background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all .15s; flex-shrink: 0; color: var(--text);
    }
    .hamburger-btn:hover { border-color: var(--text); background: var(--text); color: #fff; }
    .icon-btn {
      width: 34px; height: 34px; border-radius: 9px;
      border: 1.5px solid var(--border); background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all .15s; color: var(--muted); font-size: .88rem;
    }
    .icon-btn:hover { border-color: var(--text); background: var(--text); color: #fff; }

    /* ── OFFCANVAS ── */
    #offcanvas-menu { width: 280px !important; background: var(--bg) !important; border-left: 1px solid var(--border) !important; }
    #offcanvas-menu .offcanvas-header { border-bottom: 1px solid var(--border); padding: 1.1rem 1.4rem; }
    #offcanvas-menu .offcanvas-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: .95rem; }
    .menu-label {
      font-family: 'Syne', sans-serif; font-size: .62rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase; color: var(--muted);
      padding: 1.1rem 1.4rem .4rem;
    }
    .menu-item {
      display: flex; align-items: center; gap: .7rem;
      padding: .6rem 1.4rem; font-size: .87rem; font-weight: 500;
      color: var(--text); text-decoration: none; cursor: pointer;
      border: none; background: none; width: 100%; text-align: left;
      transition: background .1s;
    }
    .menu-item:hover { background: var(--border); }
    .menu-item i { font-size: .95rem; width: 18px; color: var(--muted); }
    .menu-footer {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 1.1rem 1.4rem;
      border-top: 1px solid var(--border);
    }
    .menu-footer p { font-size: .76rem; color: var(--muted); margin: 0; line-height: 1.7; }
    .menu-footer a { color: var(--text); font-weight: 600; text-decoration: none; }
    .menu-footer a:hover { text-decoration: underline; }

    /* ── PAGE HEADER ── */
    .page-header { padding: .9rem 1.4rem .5rem; }
    .page-header h1 {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 1.2rem; letter-spacing: -.02em; margin: 0;
    }
    .page-header p { display: none; }

    /* ── SUMMARY STRIP ── */
    .summary-strip {
      display: flex; gap: 9px;
      padding: 0 1.4rem 1.4rem;
      overflow-x: auto; scrollbar-width: none;
    }
    .summary-strip::-webkit-scrollbar { display: none; }
    .s-tile {
      flex: 1; min-width: 110px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: .9rem 1rem;
      cursor: pointer; text-align: center;
      transition: transform .14s, box-shadow .14s;
    }
    .s-tile:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.07); }
    .s-tile .val {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 1.55rem; line-height: 1; margin-bottom: .25rem;
      display: flex; align-items: center; justify-content: center;
    }
    .s-tile .lbl { font-size: .68rem; color: var(--muted); font-weight: 500; letter-spacing: .02em; }
    .t-red   .val { color: #d1453b; }
    .t-amber .val { color: #c47a1a; }
    .t-green .val { color: #2a7a4b; }
    .t-blue  .val { color: #2a5fa8; }

    /* ── SECTIONS GRID ── */
    .sections-wrap { padding: 0 1.4rem 3rem; }
    .sec-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
      gap: 11px;
    }
    .sec-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 15px;
      padding: 1rem 1.1rem;
      cursor: pointer; position: relative; overflow: hidden;
      transition: transform .14s, box-shadow .14s, border-color .14s;
      scroll-margin-top: 12px;
    }
    .sec-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.08); border-color: #ccc; }
    .del-btn { display: none; }
    .sec-icon { font-size: 1.5rem; margin-bottom: .5rem; line-height: 1; }
    .sec-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: .92rem; margin: 0 0 .12rem; }
    .sec-loc  { font-size: .74rem; color: var(--muted); margin: 0 0 .7rem; }
    .sec-pills { display: flex; flex-wrap: wrap; gap: 4px; }
    .pill {
      font-size: .68rem; font-weight: 500; padding: 2px 8px;
      border-radius: var(--pill-r); display: inline-flex; align-items: center; gap: 3px;
    }
    .p-red    { background: #fee2e2; color: #b91c1c; }
    .p-amber  { background: #fef3c7; color: #92400e; }
    .p-green  { background: #dcfce7; color: #166534; }
    .p-gray   { background: #f1f5f9; color: #64748b; }

    .add-card {
      background: transparent;
      border: 2px dashed var(--border);
      border-radius: 15px;
      cursor: pointer; min-height: 126px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: .45rem;
      transition: border-color .15s, background .15s;
    }
    .add-card:hover { border-color: #aaa; background: var(--surface); }
    .add-card i { font-size: 1.4rem; color: var(--muted); }
    .add-card span { font-size: .76rem; font-weight: 600; color: var(--muted); font-family: 'Syne', sans-serif; }

    /* ── SEARCH BAR ── */
    .search-wrap { padding: 0 1.4rem .8rem; }
    .search-box {
      display: flex; align-items: center; gap: .6rem;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 12px; padding: .6rem 1rem;
      transition: border-color .15s;
    }
    .search-box:focus-within { border-color: var(--text); }
    .search-box i { color: var(--muted); font-size: .95rem; flex-shrink: 0; transition: color .15s; }
    .search-box:focus-within i { color: var(--text); }
    .search-box input {
      border: none; background: none; outline: none;
      font-family: 'DM Sans', sans-serif; font-size: .87rem;
      color: var(--text); width: 100%;
    }
    .search-box input::placeholder { color: var(--muted); }
    .search-empty {
      grid-column: 1/-1; text-align: center;
      padding: 3rem 0; color: var(--muted);
      font-size: .87rem; font-style: italic; display: none;
    }
    @media (max-width: 600px) { .search-wrap { padding: 0 1rem .8rem; } }

    /* ── MODALS ── */
    .modal-content { border: 1.5px solid var(--border) !important; border-radius: 18px !important; box-shadow: 0 20px 60px rgba(0,0,0,.12) !important; }
    .modal-header { border-bottom: 1px solid var(--border); padding: 1rem 1.3rem; }
    .modal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: .92rem; }
    .modal-body { padding: 1.1rem 1.3rem; }
    .modal-footer { padding: .7rem 1.3rem 1rem; border-top: none; }
    .form-label { font-size: .72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .3rem; }
    .form-control, .form-select { border: 1.5px solid var(--border); border-radius: 9px; font-size: .87rem; background: var(--bg); color: var(--text); }
    .form-control:focus, .form-select:focus { border-color: var(--text); box-shadow: none; background: #fff; }
    .btn-solid { background: var(--text); color: #fff; border: none; border-radius: 9px; font-family: 'Syne', sans-serif; font-size: .78rem; font-weight: 700; letter-spacing: .04em; padding: .42rem 1rem; }
    .btn-solid:hover { background: #333; color: #fff; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1.5px solid var(--border); border-radius: 9px; font-size: .78rem; padding: .42rem .9rem; }
    .btn-ghost:hover { border-color: #aaa; color: var(--text); }

    /* ── SITE SWITCH OVERLAY ── */
    #site-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(245,244,240,.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
    }
    #site-overlay.active { display: flex; }
    .overlay-spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin .65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MOBILE SITE DROPDOWN ── */
    .site-dropdown-wrap { display: none; position: relative; }
    .site-dropdown-btn {
      font-family: 'Syne', sans-serif; font-size: .75rem; font-weight: 700;
      letter-spacing: .04em; text-transform: uppercase;
      padding: 6px 12px 6px 14px; border-radius: var(--pill-r);
      border: 1.5px solid var(--text); background: var(--text); color: #fff;
      cursor: pointer; display: flex; align-items: center; gap: 6px;
      white-space: nowrap;
    }
    .site-dropdown-btn i { font-size: .7rem; transition: transform .2s; }
    .site-dropdown-btn.open i { transform: rotate(180deg); }
    .site-dropdown-list {
      display: none; position: absolute; top: calc(100% + 6px); left: 0;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 5px; min-width: 160px;
      box-shadow: 0 8px 24px rgba(0,0,0,.1); z-index: 200;
    }
    .site-dropdown-list.open { display: block; }
    .site-dropdown-item {
      font-family: 'Syne', sans-serif; font-size: .72rem; font-weight: 600;
      letter-spacing: .04em; text-transform: uppercase;
      padding: 7px 12px; border-radius: 8px; cursor: pointer; border: none;
      background: none; width: 100%; text-align: left; color: var(--muted);
      transition: background .12s, color .12s;
    }
    .site-dropdown-item:hover { background: var(--bg); color: var(--text); }
    .site-dropdown-item.active { color: var(--text); font-weight: 800; }
    .site-dropdown-item.active::before { content: '✓ '; }

    @media (max-width: 600px) {
      .site-switcher { display: none; }
      .site-dropdown-wrap { display: block; }
      .topbar { padding: 0 1rem; }
      .page-header { padding: .7rem 1rem .4rem; }
      .summary-strip { padding: 0 1rem 1.1rem; }
      .sections-wrap { padding: 0 1rem 2.5rem; }
    }
  </style>
</head>
<body>

  <div id="site-overlay"><div class="overlay-spinner"></div></div>

  <!-- ── TOP BAR ── -->
  <div class="topbar">
    <!-- Pill switcher: tablet+ -->
    <!-- Home icons -->
    <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
      <button class="icon-btn" title="Landing Page" onclick="window.location='/'">
        <i class="bi bi-house-fill"></i>
      </button>
    </div>

    <div class="site-switcher" id="site-switcher">
      <button class="site-btn" data-site="C01158">96 Shell</button>
      <button class="site-btn" data-site="C01288">Riverside Shell</button>
      <button class="site-btn" data-site="C09066">72 Shell</button>
    </div>
    <!-- Dropdown: mobile only -->
    <div class="site-dropdown-wrap" id="site-dropdown-wrap">
      <button class="site-dropdown-btn" id="site-dropdown-btn">
        <span id="site-dropdown-label">96 Shell</span>
        <i class="bi bi-chevron-down"></i>
      </button>
      <div class="site-dropdown-list" id="site-dropdown-list">
        <button class="site-dropdown-item" data-site="C01158">96 Shell</button>
        <button class="site-dropdown-item" data-site="C01288">Riverside Shell</button>
        <button class="site-dropdown-item" data-site="C09066">72 Shell</button>
      </div>
    </div>
    <button class="hamburger-btn" data-bs-toggle="offcanvas" data-bs-target="#offcanvas-menu">
      <i class="bi bi-list"></i>
    </button>
  </div>

  <!-- ── OFFCANVAS MENU ── -->
  <div class="offcanvas offcanvas-end" id="offcanvas-menu" tabindex="-1">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">Menu</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0" style="display:flex;flex-direction:column;height:100%;overflow:hidden;">
      <div style="flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:thin;scrollbar-color:var(--border) transparent;">
      <div class="menu-label">Navigate</div>
      <button class="menu-item" onclick="window.location='/'" data-bs-dismiss="offcanvas">
        <i class="bi bi-house"></i> Landing Page
      </button>
      <div class="menu-label">Actions</div>
      <button class="menu-item" data-bs-dismiss="offcanvas" data-bs-toggle="modal" data-bs-target="#modal-add-section">
        <i class="bi bi-plus-circle"></i> Add Section
      </button>
      <button class="menu-item" data-bs-dismiss="offcanvas" onclick="loadDashboard()">
        <i class="bi bi-arrow-clockwise"></i> Refresh
      </button>
      <div class="menu-label">Quick View</div>
      <button class="menu-item" data-bs-dismiss="offcanvas" data-bs-toggle="modal" data-bs-target="#modal-expiry-detail">
        <i class="bi bi-exclamation-circle"></i> Expiry Alerts
      </button>
      <button class="menu-item" data-bs-dismiss="offcanvas" data-bs-toggle="modal" data-bs-target="#modal-order-detail">
        <i class="bi bi-cart"></i> Pending Orders
      </button>
      <button class="menu-item" data-bs-dismiss="offcanvas" data-bs-toggle="modal" data-bs-target="#modal-clean-detail">
        <i class="bi bi-droplet"></i> Cleaning Status
      </button>

      <div class="menu-label">Daily Operations</div>
      <button class="menu-item" onclick="window.location='/daily-checklist.html'" data-bs-dismiss="offcanvas">
        <i class="bi bi-list-check"></i> Daily Checklist
      </button>
      <button class="menu-item" onclick="window.location='/shift-checklist.html'" data-bs-dismiss="offcanvas">
        <i class="bi bi-clipboard-check"></i> Shift Checklist
      </button>
      <button class="menu-item" onclick="window.location='/weekly-checklist.html'" data-bs-dismiss="offcanvas">
        <i class="bi bi-calendar-week"></i> Weekly Checklist
      </button>

      <div class="menu-label">Manager</div>
      <button class="menu-item" onclick="window.location='/weekly-report.html'" data-bs-dismiss="offcanvas">
        <i class="bi bi-file-earmark-bar-graph"></i> Weekly Report
      </button>
      <button class="menu-item" onclick="window.location='/sandwich-tracker.html'" data-bs-dismiss="offcanvas">
        <i class="bi bi-egg-fried"></i> Sandwich Tracker
      </button>
      <button class="menu-item" onclick="window.location='/schedule.html'" data-bs-dismiss="offcanvas">
        <i class="bi bi-calendar-plus"></i> Upload Schedule
      </button>
      </div><!-- /scroll-area -->

      <div style="flex-shrink:0;border-top:1px solid var(--border);padding:1rem 1.4rem;background:var(--bg);">
<p style="font-size:.76rem;color:var(--muted);margin:0 0 .5rem;">Made by <a href="https://www.abhishekchouhan.dev" target="_blank" rel="noopener" style="color:var(--text);font-weight:600;text-decoration:none;">Abhishek</a></p>
        <a href="https://www.abhishekchouhan.dev" target="_blank" rel="noopener"
           style="display:inline-flex;align-items:center;gap:5px;font-size:.76rem;font-weight:600;color:var(--text);text-decoration:none;padding:5px 10px;border:1.5px solid var(--border);border-radius:8px;">
          abhishekchouhan.dev <i class="bi bi-arrow-up-right" style="font-size:.7rem;"></i>
        </a>
      </div>
    </div>
  </div>

  <!-- ── PAGE HEADER ── -->
  <div class="page-header">
    <h1 id="page-title">Sections</h1>
    <p id="page-subtitle">Select a section to manage tasks.</p>
  </div>

  <!-- ── SUMMARY STRIP ── -->
  <div class="summary-strip">
    <div class="s-tile t-red" data-bs-toggle="modal" data-bs-target="#modal-expiry-detail">
      <div class="val" id="sum-expiry">—</div>
      <div class="lbl">Expiry Alerts</div>
    </div>
    <div class="s-tile t-amber" data-bs-toggle="modal" data-bs-target="#modal-order-detail">
      <div class="val" id="sum-orders">—</div>
      <div class="lbl">Pending Orders</div>
    </div>
    <div class="s-tile t-green" data-bs-toggle="modal" data-bs-target="#modal-clean-detail">
      <div class="val" id="sum-cleans">—</div>
      <div class="lbl">Cleans This Week</div>
    </div>
    <div class="s-tile t-blue">
      <div class="val" id="sum-sections">—</div>
      <div class="lbl">Sections</div>
    </div>
  </div>

  <!-- ── SEARCH BAR ── -->
  <div class="search-wrap">
    <div class="search-box">
      <i class="bi bi-search"></i>
      <input type="text" id="section-search" placeholder="Type to search a section…" autocomplete="off"/>
    </div>
  </div>

  <!-- ── SECTIONS GRID ── -->
  <div class="sections-wrap">
    <div class="sec-grid" id="sections-grid">
      <div style="grid-column:1/-1;text-align:center;padding:3rem 0;color:var(--muted);font-size:.87rem;">
        <div class="spinner-border spinner-border-sm me-2"></div>Loading…
      </div>
    </div>
  </div>

  <!-- ═══ Modal: Add Section ═══ -->
  <div class="modal fade" id="modal-add-section" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add Section</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Section Name *</label>
            <input type="text" class="form-control form-control-sm" id="add-sec-name" placeholder="e.g. Frozen Treats"/>
          </div>
          <div class="mb-3">
            <label class="form-label">Icon (emoji)</label>
            <input type="text" class="form-control form-control-sm" id="add-sec-icon" placeholder="🍦" maxlength="4"/>
          </div>
          <div class="mb-3">
            <label class="form-label">Location</label>
            <input type="text" class="form-control form-control-sm" id="add-sec-location" placeholder="e.g. Aisle 6"/>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-solid" id="add-sec-save">Add Section</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ Modal: Expiry Detail ═══ -->
  <div class="modal fade" id="modal-expiry-detail" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-exclamation-circle text-danger me-2"></i>Expiry Alerts</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="expiry-detail-body">
          <div class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm"></div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ Modal: Order Detail ═══ -->
  <div class="modal fade" id="modal-order-detail" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-cart text-warning me-2"></i>Pending Orders</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="order-detail-body">
          <div class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm"></div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ Modal: Cleaning Detail ═══ -->
  <div class="modal fade" id="modal-clean-detail" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-droplet text-success me-2"></i>Cleaning Status</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="clean-detail-body">
          <div class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm"></div></div>
        </div>
      </div>
