<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Store Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pill-r: 999px;
      /* overridden by JS based on time of day */
      --bg:      #f5f4f0;
      --surface: #ffffff;
      --border:  #e4e2dc;
      --text:    #1a1a18;
      --muted:   #8a8880;
      --accent:  #1a1a18;
      --face:    '☀️';
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.4rem;
      transition: background .6s ease;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 32px rgba(0,0,0,.06);
      animation: cardIn .55s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── FACE ── */
    .face {
      font-size: 3.2rem;
      line-height: 1;
      margin-bottom: 1.2rem;
      display: block;
      animation: faceIn .7s cubic-bezier(.34,1.56,.64,1) .1s both;
      user-select: none;
    }
    @keyframes faceIn {
      from { opacity: 0; transform: scale(.4) rotate(-15deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    /* ── GREETING ── */
    .greeting {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: -.02em;
      line-height: 1.25;
      margin-bottom: .6rem;
      animation: textIn .5s ease .25s both;
    }
    .quote {
      font-size: .84rem;
      color: var(--muted);
      line-height: 1.6;
      font-style: italic;
      margin-bottom: 2rem;
      padding: 0 .5rem;
      animation: textIn .5s ease .35s both;
    }
    @keyframes textIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 1.4rem;
      animation: textIn .5s ease .45s both;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider span {
      font-family: 'Syne', sans-serif;
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── SITE BUTTONS ── */
    .site-grid {
      display: flex;
      flex-direction: column;
      gap: .65rem;
      animation: textIn .5s ease .55s both;
    }
    .site-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .85rem 1.2rem;
      border-radius: 14px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      cursor: pointer;
      transition: all .18s ease;
      text-decoration: none;
    }
    .site-btn:hover {
      border-color: var(--accent);
      background: var(--surface);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,.07);
    }
    .site-btn-left {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
    }
    .site-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: .92rem;
      color: var(--text);
    }
    .site-code {
      font-size: .72rem;
      color: var(--muted);
      font-weight: 500;
    }
    .site-arrow {
      font-size: .85rem;
      color: var(--muted);
      transition: transform .15s, color .15s;
    }
    .site-btn:hover .site-arrow {
      transform: translateX(3px);
      color: var(--text);
    }

    /* ── FOOTER ── */
    .footer {
      margin-top: 1.8rem;
      font-size: .72rem;
      color: var(--muted);
      animation: textIn .5s ease .7s both;
    }
    .footer a {
      color: var(--muted);
      text-decoration: none;
      font-weight: 600;
      transition: color .12s;
    }
    .footer a:hover { color: var(--text); }

    /* ── TIME DOT ── */
    .time-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      margin-right: 5px;
      vertical-align: middle;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .35; }
    }

    @media (max-width: 420px) {
      .card { padding: 2rem 1.4rem; border-radius: 20px; }
      .greeting { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

  <div class="card">
    <span class="face" id="face">☀️</span>
    <h1 class="greeting" id="greeting">Good Morning</h1>
    <p class="quote" id="quote">"Loading…"</p>

    <div class="divider">
      <span>Select a site to begin</span>
    </div>

    <div class="site-grid">
      <a class="site-btn" href="/dashboard.html" onclick="setSite('C01158')">
        <div class="site-btn-left">
          <span class="site-name">96 Shell</span>
          <span class="site-code">C01158</span>
        </div>
        <span class="site-arrow">→</span>
      </a>
      <a class="site-btn" href="/dashboard.html" onclick="setSite('C01288')">
        <div class="site-btn-left">
          <span class="site-name">Riverside Shell</span>
          <span class="site-code">C01288</span>
        </div>
        <span class="site-arrow">→</span>
      </a>
      <a class="site-btn" href="/dashboard.html" onclick="setSite('C09066')">
        <div class="site-btn-left">
          <span class="site-name">72 Shell</span>
          <span class="site-code">C09066</span>
        </div>
        <span class="site-arrow">→</span>
      </a>
    </div>
  </div>

  <div class="footer">
    <span class="time-dot" id="time-dot"></span>
    <span id="time-label">Morning</span>
  </div>

  <script>
    /* ── Time of day config ── */
    const TIMES = {
      morning: {
        hours:    [6, 12],
        face:     '🌅',
        greeting: 'Good Morning',
        message:  'May you have a wonderful day at work.',
        bg:       '#fdf8f0',
        surface:  '#ffffff',
        border:   '#f0e8d8',
        accent:   '#c47a1a',
        dot:      '#f0a742',
        quotes: [
          '"The secret of getting ahead is getting started."',
          '"Morning is an important time of day because how you spend your morning can often tell you what kind of day you are going to have."',
          '"Each morning we are born again. What we do today matters most."',
          '"Rise up, start fresh, see the bright opportunity in each day."',
        ]
      },
      afternoon: {
        hours:    [12, 16],
        face:     '☀️',
        greeting: 'Good Afternoon',
        message:  'Keep up the great work — you\'re halfway there.',
        bg:       '#f5f4f0',
        surface:  '#ffffff',
        border:   '#e4e2dc',
        accent:   '#1a1a18',
        dot:      '#2a5fa8',
        quotes: [
          '"Push through. The afternoon is when great things get finished."',
          '"Somewhere, something incredible is waiting to be known."',
          '"It always seems impossible until it\'s done."',
          '"The harder you work for something, the greater you\'ll feel when you achieve it."',
        ]
      },
      evening: {
        hours:    [16, 21],
        face:     '🌆',
        greeting: 'Good Evening',
        message:  'Almost there — finish strong.',
        bg:       '#f2efe8',
        surface:  '#ffffff',
        border:   '#dedad2',
        accent:   '#7a4a1a',
        dot:      '#c47a1a',
        quotes: [
          '"Every evening I turn my worries over to God. He\'s going to be up all night anyway."',
          '"The sun is slowly sinking low, but you\'ve still got time to glow."',
          '"At the end of the day, it\'s not about what you have — it\'s about what you\'ve done."',
          '"Evening is a time of real experimentation. You attune yourself to the inner voice."',
        ]
      },
      night: {
        hours:    [21, 30], // 21–30 covers 21–24 and wraps to 6
        face:     '🌙',
        greeting: 'Good Night',
        message:  'Night shift warriors — thank you for keeping things running.',
        bg:       '#1e1e1c',
        surface:  '#2a2a28',
        border:   '#3a3a38',
        accent:   '#f5f4f0',
        dot:      '#8a8880',
        quotes: [
          '"The night shift is proof that dedication doesn\'t sleep."',
          '"Stars can\'t shine without darkness."',
          '"Some of the best work happens when the world is quiet."',
          '"Night owls see what the early birds miss."',
        ]
      }
    };

    function getTimeOfDay(hour) {
      if (hour >= 6  && hour < 12) return 'morning';
      if (hour >= 12 && hour < 16) return 'afternoon';
      if (hour >= 16 && hour < 21) return 'evening';
      return 'night';
    }

    function applyTheme() {
      const hour   = new Date().getHours();
      const period = getTimeOfDay(hour);
      const cfg    = TIMES[period];

      // Apply CSS vars
      document.documentElement.style.setProperty('--bg',      cfg.bg);
      document.documentElement.style.setProperty('--surface', cfg.surface);
      document.documentElement.style.setProperty('--border',  cfg.border);
      document.documentElement.style.setProperty('--accent',  cfg.accent);

      // Muted color
      const muted = period === 'night' ? '#6a6a68' : '#8a8880';
      document.documentElement.style.setProperty('--muted', muted);
      document.documentElement.style.setProperty('--text',
        period === 'night' ? '#f5f4f0' : '#1a1a18');

      // Content
      const quote = cfg.quotes[Math.floor(Math.random() * cfg.quotes.length)];
      document.getElementById('face').textContent     = cfg.face;
      document.getElementById('greeting').textContent = cfg.greeting;
      document.getElementById('quote').textContent    = cfg.message + '\n' + quote;
      document.getElementById('time-label').textContent =
        period.charAt(0).toUpperCase() + period.slice(1);
      document.getElementById('time-dot').style.background = cfg.dot;

      // Split quote from message for cleaner display
      document.getElementById('quote').innerHTML =
        `${cfg.message}<br><br>${quote}`;
    }

    function setSite(siteId) {
      localStorage.setItem('activeSiteId', siteId);
    }

    function getFirstNames(names) {
      if (names.length === 0) return null;
      if (names.length === 1) return names[0];
      if (names.length === 2) return `${names[0]} & ${names[1]}`;
      return names.slice(0, -1).join(', ') + ' & ' + names[names.length - 1];
    }

    /* Parse "6a-3p", "2.30p-10p", "10p-6a" → {start, end} in minutes */
    function parseShiftStr(shift) {
      if (!shift || ['off','na','-',''].includes(shift.toLowerCase().trim())) return null;
      const m = shift.match(/(\d+)(?:\.(\d+))?([ap])\s*-\s*(\d+)(?:\.(\d+))?([ap])/i);
      if (!m) return null;
      const toMins = (h, frac, period) => {
        let hr = parseInt(h);
        const min = frac ? parseInt(frac) : 0;
        if (period.toLowerCase() === 'p' && hr !== 12) hr += 12;
        if (period.toLowerCase() === 'a' && hr === 12) hr = 0;
        return hr * 60 + min;
      };
      return { start: toMins(m[1], m[2], m[3]), end: toMins(m[4], m[5], m[6]) };
    }

    function isOnNow(shiftStr) {
      const s = parseShiftStr(shiftStr);
      if (!s) return false;
      const nowMins = new Date().getHours() * 60 + new Date().getMinutes();
      if (s.end < s.start) return nowMins >= s.start || nowMins < s.end;
      return nowMins >= s.start && nowMins < s.end;
    }

    async function fetchScheduleGreeting(siteId) {
      try {
        const res  = await fetch('/api/schedule/current?siteId=' + siteId);
        const data = await res.json();
        if (!data.found || !data.schedule) return null;
        const todayIdx = new Date().getDay();
        const onShift  = data.schedule
          .filter(person => person.shifts && isOnNow(person.shifts[todayIdx]))
          .map(p => p.name.split(' ')[0]);
        return onShift.length ? getFirstNames(onShift) : null;
      } catch(e) { return null; }
    }


    async function applyThemeWithGreeting() {
      applyTheme();
      // Try to get who's on shift for the last selected site
      const siteId = localStorage.getItem('activeSiteId');
      if (!siteId) return;
      const name = await fetchScheduleGreeting(siteId);
      if (!name) return;
      const hour = new Date().getHours();
      let period = 'Morning';
      if (hour >= 12 && hour < 16) period = 'Afternoon';
      else if (hour >= 16 && hour < 21) period = 'Evening';
      else if (hour >= 21 || hour < 6) period = 'Night';
      document.getElementById('greeting').textContent = `Good ${period}, ${name}!`;
    }

    applyThemeWithGreeting();
  </script>
</body>
</html>
