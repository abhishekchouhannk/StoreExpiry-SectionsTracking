<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Store Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    body{background:#f8f9fa}
    .navbar-brand span{font-weight:700;letter-spacing:.5px}
    .section-card{border:none;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:transform .15s,box-shadow .15s;cursor:pointer}
    .section-card:hover{transform:translateY(-3px);box-shadow:0 6px 16px rgba(0,0,0,.12)}
    .section-icon{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem}
    .stat-pill{font-size:.75rem;padding:3px 10px;border-radius:20px}
    .page-header h1{font-weight:700;font-size:1.6rem}
    .page-header p{color:#6c757d;font-size:.95rem}
    .summary-card{cursor:pointer;transition:transform .12s}
    .summary-card:hover{transform:translateY(-2px)}
    .delete-section-btn{opacity:0;transition:opacity .15s;z-index:3}
    .section-card:hover .delete-section-btn{opacity:1}
    .add-card{border:2px dashed #dee2e6!important;min-height:140px}
    .add-card:hover{border-color:#adb5bd!important;background:#f1f3f5}
  </style>
</head>
<body>

  <nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
      <i class="bi bi-shop fs-5"></i><span>Store Manager</span>
    </a>
    <span class="text-light small"><i class="bi bi-person-circle me-1"></i>Staff</span>
  </nav>

  <div class="container py-4">
    <div class="page-header mb-4">
      <h1>Store Sections</h1>
      <p class="mb-0">Select a section to manage cleaning, planograms, expiry, and orders.</p>
    </div>

    <!-- Summary Bar -->
    <div class="row g-3 mb-4" id="summary-bar">
      <div class="col-6 col-md-3">
        <div class="card border-0 rounded-3 shadow-sm text-center py-3 summary-card"
             data-bs-toggle="modal" data-bs-target="#modal-expiry-detail">
          <div class="fs-4 fw-bold text-danger" id="sum-expiry">—</div>
          <div class="text-muted small">Expiry Alerts</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card border-0 rounded-3 shadow-sm text-center py-3 summary-card"
             data-bs-toggle="modal" data-bs-target="#modal-order-detail">
          <div class="fs-4 fw-bold text-warning" id="sum-orders">—</div>
          <div class="text-muted small">Pending Orders</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card border-0 rounded-3 shadow-sm text-center py-3 summary-card"
             data-bs-toggle="modal" data-bs-target="#modal-clean-detail">
          <div class="fs-4 fw-bold text-success" id="sum-cleans">—</div>
          <div class="text-muted small">Cleans This Week</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card border-0 rounded-3 shadow-sm text-center py-3">
          <div class="fs-4 fw-bold text-primary" id="sum-sections">—</div>
          <div class="text-muted small">Sections Active</div>
        </div>
      </div>
    </div>

    <!-- Sections Grid -->
    <div class="row g-3" id="sections-grid">
      <div class="col-12 text-center py-5 text-muted" id="loading-msg">
        <div class="spinner-border spinner-border-sm me-2"></div>Loading…
      </div>
    </div>
  </div>

  <!-- ═══ Modal: Add Section ═══ -->
  <div class="modal fade" id="modal-add-section" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow">
        <div class="modal-header">
          <h5 class="modal-title fw-semibold"><i class="bi bi-plus-circle text-primary me-2"></i>Add Section</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label small fw-semibold">Section Name *</label>
            <input type="text" class="form-control form-control-sm" id="add-sec-name" placeholder="e.g. Frozen Treats"/>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold">Icon (emoji)</label>
            <input type="text" class="form-control form-control-sm" id="add-sec-icon" placeholder="🍦" maxlength="4"/>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-semibold">Location</label>
            <input type="text" class="form-control form-control-sm" id="add-sec-location" placeholder="e.g. Aisle 6"/>
          </div>
        </div>
        <div class="modal-footer border-0 pt-0">
          <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-primary btn-sm" id="add-sec-save">Add Section</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ Modal: Expiry Detail ═══ -->
  <div class="modal fade" id="modal-expiry-detail" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content border-0 shadow">
        <div class="modal-header">
          <h5 class="modal-title fw-semibold"><i class="bi bi-exclamation-triangle text-danger me-2"></i>Expiry Alerts by Section</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="expiry-detail-body">
          <div class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm"></div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ Modal: Order Detail ═══ -->
  <div class="modal fade" id="modal-order-detail" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content border-0 shadow">
        <div class="modal-header">
          <h5 class="modal-title fw-semibold"><i class="bi bi-cart text-warning me-2"></i>Pending Orders by Section</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="order-detail-body">
          <div class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm"></div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ Modal: Cleaning Detail ═══ -->
  <div class="modal fade" id="modal-clean-detail" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow">
        <div class="modal-header">
          <h5 class="modal-title fw-semibold"><i class="bi bi-droplet text-success me-2"></i>Cleaning Status This Week</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="clean-detail-body">
          <div class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm"></div></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
